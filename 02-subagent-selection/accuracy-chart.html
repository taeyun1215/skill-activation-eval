<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서브에이전트 선택 정확도 추이</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0d1117;
    color: #e6edf3;
    display: flex;
    justify-content: flex-start;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 40px;
  }
  .container {
    max-width: 720px;
    width: 100%;
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 8px;
    color: #e6edf3;
  }
  .subtitle {
    font-size: 14px;
    color: #8b949e;
    margin-bottom: 32px;
  }
  .row {
    display: flex;
    align-items: center;
    margin-bottom: 12px;
    position: relative;
  }
  .label {
    width: 180px;
    flex-shrink: 0;
    text-align: left;
    padding-right: 16px;
    font-size: 13px;
    line-height: 1.3;
  }
  .label .version {
    font-weight: 700;
    color: #e6edf3;
    font-size: 14px;
  }
  .label .desc {
    color: #8b949e;
    font-size: 12px;
  }
  .bar-track {
    flex: 1;
    height: 36px;
    background: #161b22;
    border-radius: 6px;
    position: relative;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 12px;
    font-weight: 700;
    font-size: 15px;
    color: #fff;
    transition: width 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    width: 0;
  }
  .bar-fill.v1 { background: linear-gradient(90deg, #6e4027, #da6d35); }
  .bar-fill.v2 { background: linear-gradient(90deg, #5b3f8c, #8b5cf6); }
  .bar-fill.v3 { background: linear-gradient(90deg, #1a5276, #3b82f6); }
  .bar-fill.v4 { background: linear-gradient(90deg, #1a6b4a, #22c55e); }
  .bar-fill.v5 { background: linear-gradient(90deg, #7c5c10, #eab308); }

  .delta {
    position: absolute;
    right: -52px;
    font-size: 12px;
    font-weight: 600;
    color: #3fb950;
  }

  .connector {
    display: flex;
    align-items: center;
    margin-bottom: 12px;
    padding-left: 180px;
  }
  .connector .arrow {
    width: 24px;
    text-align: center;
    color: #484f58;
    font-size: 14px;
    margin-right: 8px;
  }
  .connector .insight {
    font-size: 12px;
    color: #8b949e;
    font-style: italic;
  }

  .footer {
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid #21262d;
    font-size: 12px;
    color: #484f58;
    text-align: center;
  }
</style>
</head>
<body>
<div class="container">
  <h1>서브에이전트 선택 정확도 추이</h1>
  <!-- subtitle removed -->

  <!-- v1 -->
  <div class="row">
    <div class="label">
      <div class="version">v1</div>
      <div class="desc">위임 지시 강도</div>
    </div>
    <div class="bar-track">
      <div class="bar-fill v1" data-width="50">50%</div>
    </div>
    <div class="delta" style="color: #8b949e;">baseline</div>
  </div>

  <div class="connector">
    <div class="arrow">↓</div>
    <div class="insight">강도는 무의미. 설명이 없어서 못 고름</div>
  </div>

  <!-- v2 -->
  <div class="row">
    <div class="label">
      <div class="version">v2</div>
      <div class="desc">CLAUDE.md 설명 추가</div>
    </div>
    <div class="bar-track">
      <div class="bar-fill v2" data-width="62">62%</div>
    </div>
    <div class="delta">+12%p</div>
  </div>

  <div class="connector">
    <div class="arrow">↓</div>
    <div class="insight">조금 나음. 근데 description이 더 중요</div>
  </div>

  <!-- v3 -->
  <div class="row">
    <div class="label">
      <div class="version">v3</div>
      <div class="desc">description 교차참조</div>
    </div>
    <div class="bar-track">
      <div class="bar-fill v3" data-width="72">72%</div>
    </div>
    <div class="delta">+10%p</div>
  </div>

  <div class="connector">
    <div class="arrow">↓</div>
    <div class="insight">큰 점프. 하지만 72%가 한계</div>
  </div>

  <!-- v4 -->
  <div class="row">
    <div class="label">
      <div class="version">v4</div>
      <div class="desc">훅 기반 강제 평가</div>
    </div>
    <div class="bar-track">
      <div class="bar-fill v4" data-width="82">82%</div>
    </div>
    <div class="delta">+10%p</div>
  </div>

  <div class="connector">
    <div class="arrow">↓</div>
    <div class="insight">효과적. 근데 키워드 편향이 남음</div>
  </div>

  <!-- v5 -->
  <div class="row">
    <div class="label">
      <div class="version">v5</div>
      <div class="desc">Step 0 요청 분류</div>
    </div>
    <div class="bar-track">
      <div class="bar-fill v5" data-width="87">87%</div>
    </div>
    <div class="delta">+5%p</div>
  </div>

  <div class="footer">
    skill-activation-eval / 02-subagent-selection
  </div>
</div>

<script>
  // Animate bars on load
  window.addEventListener('load', () => {
    setTimeout(() => {
      document.querySelectorAll('.bar-fill').forEach(bar => {
        const w = bar.dataset.width;
        bar.style.width = w + '%';
      });
    }, 200);
  });
</script>
</body>
</html>
